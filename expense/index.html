<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.gstatic.com">  
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Wire+One&display=swap" rel="stylesheet">
    <script src="script.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Expense Tracker</h1>
    </header>
    <header>
        <h2>Add A New Item:</h2>
    </header>
    <main>
        <div class="name-box">
            <label for="name" id="name-label">Name:</label>
            <input id="name-input">
        </div>
        <div class="input-row-2">
            <label for="date">Date:</label>
            <input type="date" placeholder="yyyy-mm-dd" id="date-input">
            <label for="amount" id="amount-label">Amount:</label>
            <input id="amount-input">
        </div>
        <button id="add-expense-button" 
                onclick="addExpense()">Add Expense
        </button>
        <table id="expense-table">
            <tr>
                <th>Name</th>
                <th>Date</th>
                <th>Amount</th>
            </tr>
            <tr>
                <td colspan="3">No expenses added yet!</td>
            </tr>
        </table>
    <main>
</body>
</html>
